services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
      POSTGRES_DB: echo
    ports:
      - '5433:5432'
    volumes:
      - echo_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U echo -d echo']
      interval: 5s
      timeout: 5s
      retries: 10

  embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    restart: unless-stopped
    command: --model-id BAAI/bge-small-en-v1.5
    volumes:
      - tei_data:/data
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://localhost/health']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    ports:
      - '8080:80'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      embed:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://echo:echo@db:5432/echo
      PORT: 3001
      TEI_URL: http://embed:80
    ports:
      - '3001:3001'

volumes:
  echo_db:
  tei_data:
